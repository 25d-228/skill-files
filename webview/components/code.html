<!-- ============================================================
USAGE — Code syntax highlighting with Prism

When the page contains code blocks longer than ~3 lines:
1. Inline the three tags below into <head>.
2. Wrap each code block as:
     <pre><code class="language-python">...</code></pre>
3. The autoloader fetches the language grammar on demand.

Common language hints:
  language-python  language-javascript  language-typescript
  language-bash    language-html        language-css
  language-json    language-yaml        language-sql
  language-rust    language-go          language-c       language-cpp

Prism docs: https://prismjs.com/
============================================================ -->

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
<script defer
        src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script defer
        src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
